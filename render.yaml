services:
  - type: web
    name: kanbandl-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this in the Render dashboard — never commit secrets
      - key: JWT_SECRET
        sync: false   # Set this in the Render dashboard — never commit secrets
      - key: ALLOWED_ORIGINS
        value: https://kanban-six-eta.vercel.app,https://kanban-m8tee2oy-samikshaspharakate070515-8116s.projects.vercel.app
      - key: AI_BACKEND_URL
        sync: false   # Set to your AI backend URL if deployed separately
    healthCheckPath: /

  - type: web
    name: kanbandl-ai-backend
    runtime: python
    rootDir: ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
