services:
  - type: web
    name: kanbandl-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set this in the Render dashboard — never commit secrets
      - key: JWT_SECRET
        sync: false   # Set this in the Render dashboard — never commit secrets
      - key: ALLOWED_ORIGINS
        sync: false   # Set to your Vercel frontend URL, e.g. https://kanbandl.vercel.app
      - key: AI_BACKEND_URL
        sync: false   # Set to your AI backend URL if deployed separately
    healthCheckPath: /
